# AWS arm of the secrets seam — DORMANT (no EKS provisioned yet).
# Mirror of clustersecretstore.yaml but backed by AWS Secrets Manager via IRSA.
# When EKS goes live: create the IRSA role, set its ARN below, apply this file,
# and point services at it with `-f environments/cloud/eks.yaml`
# (which sets cloud.secretStore.name=aws-secret-store).
#
# Service secrets must exist in AWS Secrets Manager as flat JSON, same shape as
# the GCP secrets (e.g. secret name "gonga_prd_settings" -> {"KEY":"value",...}).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets-ksa
  namespace: external-secrets
  annotations:
    # Replace <ACCOUNT_ID> with the AWS account and the role created for ESO.
    eks.amazonaws.com/role-arn: "arn:aws:iam::<ACCOUNT_ID>:role/external-secrets-irsa"
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secret-store
spec:
  provider:
    aws:
      service: SecretsManager
      region: eu-west-1   # set to the EKS cluster region
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-ksa
            namespace: external-secrets
