apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-db-secret
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: gcp-secret-store
  target:
    name: grafana-db-secret
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: grafana_db_credentials
        property: DB_PASSWORD
