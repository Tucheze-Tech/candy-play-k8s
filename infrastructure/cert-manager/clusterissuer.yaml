apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: arnoldmusandu@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      # DNS-01 via Cloudflare — works even with the candyplay.co.ke records
      # proxied (orange cloud). Token Secret lives in the cert-manager namespace
      # (ClusterIssuer reads solver secrets from --cluster-resource-namespace).
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: token
        selector:
          dnsZones:
            - candyplay.co.ke
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: candyplay-api-tls
  namespace: candy-services
spec:
  secretName: candyplay-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - api.candyplay.co.ke
