apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: arnoldmusandu@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            ingressClassName: kong
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: candyplay-api-tls
  namespace: candy-services
spec:
  secretName: candyplay-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - api.candyplay.com
