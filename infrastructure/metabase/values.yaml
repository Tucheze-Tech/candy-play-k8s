image:
  tag: "v0.51.4"

database:
  type: postgres
  host: "127.0.0.1"
  port: 5432
  dbname: metabase_prod
  username: metabase_user

resources:
  requests:
    cpu: 250m
    memory: 1Gi
  limits:
    cpu: 1000m
    memory: 2Gi

# Metabase JVM takes 90-120s to boot; the default liveness probe killed it
# mid-startup (SIGTERM/143 -> CrashLoop). Give it room before probing.
livenessProbe:
  initialDelaySeconds: 180
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 6
readinessProbe:
  initialDelaySeconds: 60
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 12

service:
  type: ClusterIP

# pmint93/metabase chart: hosts is a list of plain hostname STRINGS, with
# path/pathType as separate keys (not the {host, paths:[...]} object form).
ingress:
  enabled: true
  className: kong
  annotations:
    konghq.com/strip-path: "true"
  hosts:
    - api.candyplay.co.ke
  path: /metabase
  pathType: Prefix
  tls:
    - secretName: candyplay-tls
      hosts:
        - api.candyplay.co.ke

# No Spot (PREEMPTIBLE_CPUS quota ~1 in europe-west3) — standard Autopilot nodes.

serviceAccount:
  create: true
  annotations:
    iam.gke.io/gcp-service-account: "metabase-sa@candy-play.iam.gserviceaccount.com"

extraEnv:
  - name: MB_DB_PASS
    valueFrom:
      secretKeyRef:
        name: metabase-db-secret
        key: password
  # Required for subpath routing — without this Metabase redirects to / and breaks
  - name: MB_SITE_URL
    value: "https://api.candyplay.co.ke/metabase"

# cloud-sql-proxy sidecar — connects Metabase to Cloud SQL via private IP
extraContainers:
  - name: cloud-sql-proxy
    image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.13.0
    args:
      - "--structured-logs"
      - "--port=5432"
      - "--private-ip"
      - "candy-play:europe-west3:candyplay-prod-pg"
    securityContext:
      runAsNonRoot: true
      allowPrivilegeEscalation: false
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi
