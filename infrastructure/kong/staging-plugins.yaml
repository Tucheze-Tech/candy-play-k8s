# Staging Kong plugins — scoped to candy-services-staging namespace
# Separate plugin objects from prod so rate limits / keys are independent
---
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: icore-key-auth-stg
  namespace: candy-services-staging
plugin: key-auth
config:
  key_names:
    - X-API-KEY
  hide_credentials: true
---
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: icore-rate-limit-stg
  namespace: candy-services-staging
plugin: rate-limiting
config:
  minute: 300       # relaxed for staging
  policy: local
  fault_tolerant: true
---
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: ev-key-auth-stg
  namespace: candy-services-staging
plugin: key-auth
config:
