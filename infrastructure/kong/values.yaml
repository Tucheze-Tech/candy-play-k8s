# Kong Gateway — PostgreSQL-backed (DB mode)
# Enables full Admin API, persistent config, and Kong Manager.

ingressController:
  enabled: true
  installCRDs: false

proxy:
  type: LoadBalancer
  annotations:
    cloud.google.com/load-balancer-type: "External"
  tls:
    enabled: true

# ---------------------------------------------------------
# Kong DB — PostgreSQL on candyplay-prod-pg via Cloud SQL PRIVATE IP.
# Direct (no cloud-sql-proxy): the proxy sidecar only lands in the main
# Deployment, NOT the migration Jobs, so 127.0.0.1 fails in migrations. Pods
# reach the private IP over the VPC (PSA peering from 02). SSL optional
# (instance is ALLOW_UNENCRYPTED_AND_ENCRYPTED). Private IP is stable for the
# instance's lifetime.
# ---------------------------------------------------------
env:
  database: "postgres"
  pg_host: "10.79.0.3"        # candyplay-prod-pg private IP
  pg_port: "5432"
  pg_database: "kong_prod"
  pg_user: "kong_user"
  pg_password:
    valueFrom:
      secretKeyRef:
        name: kong-db-secret
        key: password

  log_level: "notice"
  plugins: "bundled"

  # Admin API — listen on all interfaces inside the pod
  admin_listen: "0.0.0.0:8001"

  # Enable Kong Manager UI (requires Kong Gateway; OSS gets Admin API only)
  admin_gui_listen: "0.0.0.0:8002"

# ---------------------------------------------------------
# Admin API Service (ClusterIP — internal only)
# Access via: kubectl port-forward -n kong svc/kong-kong-admin 8001:8001
# Then: http://localhost:8001
# ---------------------------------------------------------
admin:
  enabled: true
  type: ClusterIP
  http:
    enabled: true
    servicePort: 8001
    containerPort: 8001
  tls:
    enabled: false

# ---------------------------------------------------------
# Run DB migrations on install/upgrade
# ---------------------------------------------------------
migrations:
  preUpgrade: true
  postUpgrade: true

# No cloud-sql-proxy sidecar — Kong connects to the Cloud SQL private IP
# directly (see pg_host above), so migration Jobs and the Deployment use the
# same path. Workload Identity / proxy not needed for Kong's own DB.

resources:
  requests:
    cpu: "250m"
    memory: "256Mi"
  limits:
    cpu: "1000m"
    memory: "512Mi"

replicaCount: 2

podDisruptionBudget:
  enabled: true
  minAvailable: 1
