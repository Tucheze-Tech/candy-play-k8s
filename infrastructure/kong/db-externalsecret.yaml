# Pull kong_db_credentials from GCP Secret Manager → kong-db-secret K8s Secret
# GCP Secret format (JSON): {"password": "...", "user": "kong_user"}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: kong-db-secret
  namespace: kong
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: gcp-secret-store
  target:
    name: kong-db-secret
    creationPolicy: Owner
    template:
      type: Opaque
      engineVersion: v2
  dataFrom:
    - extract:
        key: kong_db_credentials
