# Local-only Postgres + Redis for Kind development. NOT used in any cloud env
# (cloud uses Cloud SQL/RDS + the Redis chart in infrastructure/). Applied by
# the Tiltfile into the candy-services namespace.
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-initdb
  namespace: candy-services
data:
  init.sql: |
    CREATE DATABASE gonga_local;
    CREATE DATABASE ev_local;
    CREATE DATABASE tpay_local;
    CREATE DATABASE tech_local;
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: candy-services
  labels: { app: postgres }
spec:
  replicas: 1
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_USER
              value: candy
            - name: POSTGRES_PASSWORD
              value: candy
            - name: POSTGRES_DB
              value: postgres
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "candy"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: initdb
          configMap:
            name: postgres-initdb
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: candy-services
spec:
  selector: { app: postgres }
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: candy-services
  labels: { app: redis }
spec:
  replicas: 1
  selector:
    matchLabels: { app: redis }
  template:
    metadata:
      labels: { app: redis }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["--requirepass", "localredis"]
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: candy-services
spec:
  selector: { app: redis }
  ports:
    - port: 6379
      targetPort: 6379
