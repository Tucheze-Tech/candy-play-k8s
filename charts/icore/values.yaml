replicaCount: 2

image:
  repository: europe-west3-docker.pkg.dev/candy-play/cloud-run-source-deploy/icore
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

serviceAccount:
  name: icore-ksa
  # GSA email on GKE / IAM role ARN on EKS. Empty -> no identity annotation.
  gcpServiceAccount: "icore-sa@candy-play.iam.gserviceaccount.com"

# Non-secret config only. Secrets arrive via envFrom (see externalSecret).
env:
  SETTINGS_NAME: "gonga_prd_settings"
  GOOGLE_CLOUD_PROJECT: "candy-play"
  USE_CLOUD_SQL_AUTH_PROXY: "true"
  PORT: "8080"

probes:
  liveness:
    httpGet:
      path: /health/
      port: 8080
    initialDelaySeconds: 30
    periodSeconds: 15
    failureThreshold: 3
  readiness:
    httpGet:
      path: /health/
      port: 8080
    initialDelaySeconds: 10
    periodSeconds: 10

# Forward-only DB migrations as a Helm post-install/upgrade hook.
migrate:
  enabled: true
  command: ["python", "manage.py", "migrate", "--noinput"]

cloudSqlProxy:
  enabled: true
  connectionName: "candy-play:europe-west3:candyplay-prod-pg"
  image: "gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.13.0"
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "100m"
      memory: "128Mi"

externalSecret:
  enabled: true
  targetName: "icore-env-secret"
  refreshInterval: "1h"
  # Upstream secret key. MUST be flat JSON: {"KEY":"value",...} (see README).
  gcpSecretName: "gonga_prd_settings"

networkPolicy:
  enabled: true

ingress:
  enabled: true
  host: api.candyplay.co.ke
  pathPrefix: "/icore"
  tlsSecret: candyplay-tls
  kongPlugins: "icore-key-auth,icore-rate-limit"   # must match kong.plugins[].name below

# Kong objects (single source of truth — rendered by candy-common.kong).
# Plugin names here are referenced by ingress.kongPlugins above. consumer.name
# and consumer.apiKey are GLOBAL across the Kong cluster -> overridden per env.
kong:
  plugins:
    - name: icore-key-auth
      type: key-auth
      config:
        key_names: ["X-API-KEY"]
        hide_credentials: true
    - name: icore-rate-limit
      type: rate-limiting
      config:
        minute: 120
        hour: 5000
        policy: local
        fault_tolerant: true
        hide_client_headers: false
  consumer:
    name: icore-internal
    credentialSecret: icore-apikey-credential
    # Empty = chart does NOT create the Secret (legacy out-of-band flow).
    # Supply at deploy: --set kong.consumer.apiKey=$(gcloud secrets versions access ...)
    apiKey: ""

# ---------------------------------------------------------------------------
# Cloud abstraction (GKE↔EKS seam). Base defaults = GKE so an unqualified
# `helm install` behaves exactly as before. Override per cloud with
# values-cloud-gke.yaml / values-cloud-eks.yaml.
# ---------------------------------------------------------------------------
cloud:
  provider: gke
  namespace: candy-services
  serviceAccount:
    annotationKey: "iam.gke.io/gcp-service-account"
  secretStore:
    kind: ClusterSecretStore
    name: gcp-secret-store
  spot:
    nodeSelector: {}
    tolerations: []
  db:
    mode: cloudsql-proxy
