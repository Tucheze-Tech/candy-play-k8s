replicaCount: 2

image:
  repository: europe-west3-docker.pkg.dev/cm-services-prod/cloud-run-source-deploy/icore
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

serviceAccount:
  name: icore-ksa
  # GSA email on GKE / IAM role ARN on EKS. Empty -> no identity annotation.
  gcpServiceAccount: "icore-sa@cm-services-prod.iam.gserviceaccount.com"

# Non-secret config only. Secrets arrive via envFrom (see externalSecret).
env:
  SETTINGS_NAME: "gonga_prd_settings"
  GOOGLE_CLOUD_PROJECT: "cm-services-prod"
  USE_CLOUD_SQL_AUTH_PROXY: "true"
  PORT: "8080"

probes:
  liveness:
    httpGet:
      path: /health/
      port: 8080
    initialDelaySeconds: 30
    periodSeconds: 15
    failureThreshold: 3
  readiness:
    httpGet:
      path: /health/
      port: 8080
    initialDelaySeconds: 10
    periodSeconds: 10

# Forward-only DB migrations as a Helm post-install/upgrade hook.
migrate:
  enabled: true
  command: ["python", "manage.py", "migrate", "--noinput"]

cloudSqlProxy:
  enabled: true
  connectionName: "cm-services-prod:europe-west3:candyplay-prod-pg"
  image: "gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.13.0"
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "100m"
      memory: "128Mi"

externalSecret:
  enabled: true
  targetName: "icore-env-secret"
  refreshInterval: "1h"
  # Upstream secret key. MUST be flat JSON: {"KEY":"value",...} (see README).
  gcpSecretName: "gonga_prd_settings"

networkPolicy:
  enabled: true

ingress:
  enabled: true
  host: api.candyplay.com
  pathPrefix: "/icore"
  tlsSecret: candyplay-tls
  kongPlugins: "icore-key-auth,icore-rate-limit"

# ---------------------------------------------------------------------------
# Cloud abstraction (GKE↔EKS seam). Base defaults = GKE so an unqualified
# `helm install` behaves exactly as before. Override per cloud with
# values-cloud-gke.yaml / values-cloud-eks.yaml.
# ---------------------------------------------------------------------------
cloud:
  provider: gke
  namespace: candy-services
  serviceAccount:
    annotationKey: "iam.gke.io/gcp-service-account"
  secretStore:
    kind: ClusterSecretStore
    name: gcp-secret-store
  spot:
    nodeSelector: {}
    tolerations: []
  db:
    mode: cloudsql-proxy
