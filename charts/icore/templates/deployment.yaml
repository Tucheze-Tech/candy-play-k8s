apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "icore.fullname" . }}
  namespace: candy-services
  labels:
    {{- include "icore.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "icore.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "icore.selectorLabels" . | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: icore
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: PORT
              value: "{{ .Values.env.PORT }}"
            - name: SETTINGS_NAME
              value: "{{ .Values.env.SETTINGS_NAME }}"
            - name: GOOGLE_CLOUD_PROJECT
              value: "{{ .Values.env.GOOGLE_CLOUD_PROJECT }}"
            - name: USE_CLOUD_SQL_AUTH_PROXY
              value: "{{ .Values.env.USE_CLOUD_SQL_AUTH_PROXY }}"
          volumeMounts:
            - name: env-secret
              mountPath: /secrets
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health/
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
        {{- if .Values.cloudSqlProxy.enabled }}
        - name: cloud-sql-proxy
          image: {{ .Values.cloudSqlProxy.image }}
          args:
            - "--structured-logs"
            - "--port=5432"
            - "--private-ip"
            - "{{ .Values.cloudSqlProxy.connectionName }}"
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
          resources:
            {{- toYaml .Values.cloudSqlProxy.resources | nindent 12 }}
        {{- end }}
      volumes:
        - name: env-secret
          secret:
            secretName: icore-env-secret
