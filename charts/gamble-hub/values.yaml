replicaCount: 2

image:
  repository: europe-west3-docker.pkg.dev/candy-play/cloud-run-source-deploy/gamble-hub
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

serviceAccount:
  name: gamble-hub-ksa
  gcpServiceAccount: "gamble-hub-sa@candy-play.iam.gserviceaccount.com"

env:
  PORT: "8080"
  GOOGLE_CLOUD_PROJECT: "candy-play"

cloudSqlProxy:
  enabled: true
  connectionName: "candy-play:europe-west3:candyplay-prod-pg"
  image: "gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.13.0"
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "100m"
      memory: "128Mi"

externalSecret:
  secretStoreName: "gcp-secret-store"
  refreshInterval: "1h"
  gcpSecretName: "gamble_hub_settings"

networkPolicy:
  enabled: true

ingress:
  enabled: true
  host: api.candyplay.com
  pathPrefix: "/gamble-hub"
  tlsSecret: candyplay-tls
  kongPlugins: "gamble-hub-key-auth,gamble-hub-rate-limit"
