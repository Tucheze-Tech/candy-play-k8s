replicaCount: 1

image:
  repository: europe-west3-docker.pkg.dev/candy-play/cloud-run-source-deploy/tpay
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70

serviceAccount:
  name: tpay-ksa
  gcpServiceAccount: "tpay-sa@candy-play.iam.gserviceaccount.com"

env:
  GOOGLE_CLOUD_PROJECT: "candy-play"
  PORT: "8080"
  # tpay's entrypoint runs `uv run` at startup; under runAsUser:1000 the default
  # cache (/.cache/uv) and HOME (/) aren't writable -> point them at /tmp.
  HOME: "/tmp"
  UV_CACHE_DIR: "/tmp/uv-cache"

probes:
  liveness:
    httpGet:
      path: /health/
      port: 8080
    initialDelaySeconds: 30
    periodSeconds: 15
    failureThreshold: 3
  readiness:
    httpGet:
      path: /health/
      port: 8080
    initialDelaySeconds: 10
    periodSeconds: 10

migrate:
  enabled: true
  command: ["python", "manage.py", "migrate", "--noinput"]

cloudSqlProxy:
  enabled: true
  connectionName: "candy-play:europe-west3:candyplay-prod-pg"
  image: "gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.13.0"
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "100m"
      memory: "128Mi"

externalSecret:
  enabled: true
  targetName: "tpay-env-secret"
  refreshInterval: "1h"
  # MUST be flat JSON (was a single .env string before — see README cutover).
  gcpSecretName: "tpay_settings"

networkPolicy:
  enabled: true

ingress:
  enabled: true
  host: api.candyplay.co.ke
  pathPrefix: "/tpay"
  tlsSecret: candyplay-tls
  kongPlugins: "tpay-key-auth,tpay-rate-limit"   # must match kong.plugins[].name below

# Kong objects (single source of truth — rendered by candy-common.kong).
# tpay has no KongConsumer (credentials managed elsewhere) — omit consumer block.
kong:
  plugins:
    - name: tpay-key-auth
      type: key-auth
      config:
        key_names: ["X-API-KEY"]
        hide_credentials: true
    - name: tpay-rate-limit
      type: rate-limiting
      config:
        minute: 60
        hour: 2000
        policy: local
        fault_tolerant: true

cloud:
  provider: gke
  namespace: candy-services
  serviceAccount:
    annotationKey: "iam.gke.io/gcp-service-account"
  secretStore:
    kind: ClusterSecretStore
    name: gcp-secret-store
  spot:
    nodeSelector: {}
    tolerations: []
  db:
    mode: cloudsql-proxy
