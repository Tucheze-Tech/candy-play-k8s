replicaCount: 1

image:
  repository: europe-west3-docker.pkg.dev/candy-play/cloud-run-source-deploy/tpay
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70

serviceAccount:
  name: tpay-ksa
  gcpServiceAccount: "tpay-sa@candy-play.iam.gserviceaccount.com"

env:
  GOOGLE_CLOUD_PROJECT: "candy-play"
  PORT: "8080"

cloudSqlProxy:
  enabled: true
  connectionName: "candy-play:europe-west3:candyplay-prod-pg"
  image: "gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.13.0"
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "100m"
      memory: "128Mi"

externalSecret:
  secretStoreName: "gcp-secret-store"
  refreshInterval: "1h"
  gcpSecretName: "tpay_settings"

networkPolicy:
  enabled: true

ingress:
  enabled: true
  host: api.candyplay.com
  pathPrefix: "/tpay"
  tlsSecret: candyplay-tls
  kongPlugins: "tpay-key-auth,tpay-rate-limit"
