apiVersion: v1
kind: Service
metadata:
  name: {{ include "tpay.fullname" . }}
  namespace: candy-services
  labels:
    {{- include "tpay.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "tpay.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: 8080
      protocol: TCP
