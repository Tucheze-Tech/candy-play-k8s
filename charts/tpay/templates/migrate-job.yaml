apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "tpay.fullname" . }}-migrate
  namespace: candy-services
  annotations:
    helm.sh/hook: post-upgrade,post-install
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: hook-succeeded
spec:
  backoffLimit: 3
  template:
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command: ["python", "manage.py", "migrate", "--noinput"]
          env:
            - name: GOOGLE_CLOUD_PROJECT
              value: "{{ .Values.env.GOOGLE_CLOUD_PROJECT }}"
          volumeMounts:
            - name: env-secret
              mountPath: /secrets
              readOnly: true
        - name: cloud-sql-proxy
          image: {{ .Values.cloudSqlProxy.image }}
          args:
            - "--structured-logs"
            - "--port=5432"
            - "--private-ip"
            - "{{ .Values.cloudSqlProxy.connectionName }}"
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
      volumes:
        - name: env-secret
          secret:
            secretName: tpay-env-secret
