replicaCount: 1

image:
  repository: europe-west3-docker.pkg.dev/cm-services-prod/cloud-run-source-deploy/01-tech
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70

serviceAccount:
  name: 01tech-ksa
  gcpServiceAccount: "01tech-sa@cm-services-prod.iam.gserviceaccount.com"

env:
  GOOGLE_CLOUD_PROJECT: "cm-services-prod"
  PORT: "8080"

probes:
  liveness:
    httpGet:
      path: /health
      port: 8080
    initialDelaySeconds: 10
    periodSeconds: 15
    failureThreshold: 3
  readiness:
    httpGet:
      path: /health
      port: 8080
    initialDelaySeconds: 5
    periodSeconds: 10

# 01-tech (Go) has no Helm-hook migrations.
migrate:
  enabled: false
  command: []

cloudSqlProxy:
  enabled: true
  connectionName: "cm-services-prod:europe-west3:candyplay-prod-pg"
  image: "gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.13.0"
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "100m"
      memory: "128Mi"

externalSecret:
  enabled: true
  targetName: "01tech-env-secret"
  refreshInterval: "1h"
  gcpSecretName: "01tech_prd_settings"

networkPolicy:
  enabled: true

ingress:
  enabled: true
  host: api.candyplay.com
  pathPrefix: "/01tech"
  tlsSecret: candyplay-tls
  kongPlugins: "01tech-key-auth,01tech-rate-limit"

# Separate ingress for external callback routes (IP-restricted, no key-auth)
callbackIngress:
  enabled: true
  pathPrefix: "/01tech/v2"
  kongPlugins: "01tech-ip-restrict,01tech-rate-limit"
  allowedCidrs:
    - "0.0.0.0/0"  # replace with actual 01Tech provider CIDRs

cloud:
  provider: gke
  namespace: candy-services
  serviceAccount:
    annotationKey: "iam.gke.io/gcp-service-account"
  secretStore:
    kind: ClusterSecretStore
    name: gcp-secret-store
  spot:
    nodeSelector: {}
    tolerations: []
  db:
    mode: cloudsql-proxy
