{{- if .Values.ingress.enabled }}
# Internal routes — key-auth protected
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "01-tech.fullname" . }}-ingress
  namespace: candy-services
  annotations:
    konghq.com/strip-path: "true"
    konghq.com/plugins: {{ .Values.ingress.kongPlugins | quote }}
spec:
  ingressClassName: kong
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tlsSecret }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: {{ .Values.ingress.pathPrefix }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "01-tech.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
{{- end }}
{{- if .Values.callbackIngress.enabled }}
---
# External callback routes — IP-restricted only (HMAC verified by app)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "01-tech.fullname" . }}-callbacks-ingress
  namespace: candy-services
  annotations:
    konghq.com/strip-path: "false"
    konghq.com/plugins: {{ .Values.callbackIngress.kongPlugins | quote }}
spec:
  ingressClassName: kong
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tlsSecret }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: {{ .Values.callbackIngress.pathPrefix }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "01-tech.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
{{- end }}
