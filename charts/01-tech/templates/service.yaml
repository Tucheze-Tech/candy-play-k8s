apiVersion: v1
kind: Service
metadata:
  name: {{ include "01-tech.fullname" . }}
  namespace: candy-services
  labels:
    {{- include "01-tech.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "01-tech.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: 8080
      protocol: TCP
