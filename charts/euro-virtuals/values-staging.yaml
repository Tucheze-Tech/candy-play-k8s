replicaCount: 1

image:
  tag: "staging-latest"

env:
  GOOGLE_CLOUD_PROJECT: "candy-play"
  PORT: "8080"

autoscaling:
  minReplicas: 1
  maxReplicas: 2

externalSecret:
  gcpSecretName: "ev_stg_settings"

ingress:
  host: api-dev.candyplay.com
  pathPrefix: "/ev"
  tlsSecret: candyplay-dev-tls
  kongPlugins: "ev-key-auth-stg,ev-rate-limit-stg"

resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"
