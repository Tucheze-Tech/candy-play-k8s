replicaCount: 1

# Staging lives in its own namespace + KSA inside the same GKE cluster.
# Templates pin metadata.namespace to cloud.namespace, and WI binds
# candy-services-staging/<svc>-ksa-stg, so both must be overridden here.
cloud:
  namespace: candy-services-staging

serviceAccount:
  name: ev-ksa-stg

image:
  tag: "staging-latest"

env:
  GOOGLE_CLOUD_PROJECT: "candy-play"
  PORT: "8080"

autoscaling:
  minReplicas: 1
  maxReplicas: 2

externalSecret:
  gcpSecretName: "ev_stg_settings"

ingress:
  host: api-dev.candyplay.co.ke
  pathPrefix: "/ev"
  tlsSecret: candyplay-dev-tls
  kongPlugins: "ev-key-auth-stg,ev-rate-limit-stg"

# Staging Kong objects: -stg names + relaxed limits. Lists replace wholesale.
kong:
  plugins:
    - name: ev-key-auth-stg
      type: key-auth
      config:
        key_names: ["X-API-KEY"]
        hide_credentials: true
    - name: ev-rate-limit-stg
      type: rate-limiting
      config:
        minute: 300
        policy: local
        fault_tolerant: true
  consumer:
    name: ev-internal-stg
    credentialSecret: ev-apikey-credential-stg
    apiKey: ""

resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"
