apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: ev-key-auth
  namespace: {{ .Values.cloud.namespace }}
plugin: key-auth
config:
  key_names:
    - X-API-KEY
  hide_credentials: true
---
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: ev-rate-limit
  namespace: {{ .Values.cloud.namespace }}
plugin: rate-limiting
config:
  minute: 120
  hour: 5000
  policy: local
  fault_tolerant: true
  hide_client_headers: false
---
apiVersion: configuration.konghq.com/v1
kind: KongConsumer
metadata:
  name: ev-internal
  namespace: {{ .Values.cloud.namespace }}
  annotations:
    kubernetes.io/ingress.class: kong
username: ev-internal
credentials:
  - ev-apikey-credential
