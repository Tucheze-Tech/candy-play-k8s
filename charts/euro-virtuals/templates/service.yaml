apiVersion: v1
kind: Service
metadata:
  name: {{ include "euro-virtuals.fullname" . }}
  namespace: candy-services
  labels:
    {{- include "euro-virtuals.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "euro-virtuals.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: 8080
      protocol: TCP
