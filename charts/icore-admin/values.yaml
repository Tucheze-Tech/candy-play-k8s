replicaCount: 1

image:
  repository: europe-west3-docker.pkg.dev/candy-play/cloud-run-source-deploy/icore-admin
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

autoscaling:
  enabled: false

serviceAccount:
  name: icore-ksa
  gcpServiceAccount: "icore-sa@candy-play.iam.gserviceaccount.com"

env:
  SETTINGS_NAME: "gonga_prd_settings"
  GOOGLE_CLOUD_PROJECT: "candy-play"
  USE_CLOUD_SQL_AUTH_PROXY: "true"
  PORT: "8080"

probes:
  liveness:
    httpGet:
      path: /admin/login/
      port: 8080
    initialDelaySeconds: 30
    periodSeconds: 15
    failureThreshold: 3
  readiness:
    httpGet:
      path: /admin/login/
      port: 8080
    initialDelaySeconds: 10
    periodSeconds: 10

migrate:
  enabled: false

cloudSqlProxy:
  enabled: true
  connectionName: "candy-play:europe-west3:candyplay-prod-pg"
  image: "gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.13.0"
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "100m"
      memory: "128Mi"

externalSecret:
  enabled: true
  targetName: "icore-admin-env-secret"
  refreshInterval: "1h"
  gcpSecretName: "gonga_prd_settings"

networkPolicy:
  enabled: true

ingress:
  enabled: true
  host: api.candyplay.co.ke
  pathPrefix: "/icore-admin"
  tlsSecret: candyplay-tls
  kongPlugins: ""

cloud:
  provider: gke
  namespace: candy-services
  serviceAccount:
    annotationKey: "iam.gke.io/gcp-service-account"
  secretStore:
    kind: ClusterSecretStore
    name: gcp-secret-store
  spot:
    nodeSelector: {}
    tolerations: []
  db:
    mode: cloudsql-proxy
